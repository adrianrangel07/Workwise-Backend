name: Deploy to EC2

on:
  push:
    branches: [ main ]  # Cuando alguien sube a main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Build Docker image
        run: docker build -t TU_USUARIO/workwise-backend:${{ github.sha }} .
      
      - name: Push to Docker Hub
        run: |
          docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
          docker push TU_USUARIO/workwise-backend:${{ github.sha }}
          docker tag TU_USUARIO/workwise-backend:${{ github.sha }} TU_USUARIO/workwise-backend:latest
          docker push TU_USUARIO/workwise-backend:latest
      
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull TU_USUARIO/workwise-backend:latest
            docker stop workwise-backend || true
            docker rm workwise-backend || true
            docker run -d -p 8080:8080 --name workwise-backend \
              -e DB_HOST=${{ secrets.DB_HOST }} \
              -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
              TU_USUARIO/workwise-backend:latest