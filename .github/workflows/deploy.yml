name: Deploy WorkWise Backend to EC2

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Generate metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/workwise-backend
          tags: |
            type=sha,prefix=
            type=raw,value=latest
            type=raw,value=${{ github.run_number }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "📦 Pulling latest image..."
            docker pull ${{ secrets.DOCKER_USERNAME }}/workwise-backend:latest
            
            echo "🛑 Stopping old container..."
            docker stop workwise-backend || true
            docker rm workwise-backend || true
            
            echo "🚀 Starting new container..."
            docker run -d \
              --name workwise-backend \
              -p 8080:8080 \
              --restart unless-stopped \
              -e DB_HOST=${{ secrets.DB_HOST }} \
              -e DB_PORT=${{ secrets.DB_PORT }} \
              -e DB_NAME=${{ secrets.DB_NAME }} \
              -e DB_USER=${{ secrets.DB_USER }} \
              -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
              -e DB_SSL=${{ secrets.DB_SSL }} \
              -e MAIL_HOST=${{ secrets.MAIL_HOST }} \
              -e MAIL_PORT=${{ secrets.MAIL_PORT }} \
              -e MAIL_USERNAME=${{ secrets.MAIL_USERNAME }} \
              -e MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }} \
              -e OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }} \
              ${{ secrets.DOCKER_USERNAME }}/workwise-backend:latest
            
            echo "✅ Deployment complete!"
            sleep 5
            if docker ps | grep -q workwise-backend; then
              echo "🎉 Container is running successfully!"
              docker logs --tail 10 workwise-backend
            else
              echo "❌ Container failed to start!"
              docker logs workwise-backend
              exit 1
            fi
      
      - name: Success notification
        if: success()
        run: echo "✅ Deployed to http://${{ secrets.EC2_HOST }}:8080"
      
      - name: Failure notification
        if: failure()
        run: echo "❌ Deployment failed. Check logs above."